# Copie pytest.ini para a raiz do projeto
# Conteúdo que deve estar em C:\Users\julia\GitHub\ai-data-investigator\pytest.ini

[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    unit: unit tests
    integration: integration tests
    slow: slow tests